<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Habits">
<title>Habit Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f7f6f2;--card:#fff;--border:rgba(0,0,0,0.07);--text:#1a1a18;--text2:#999;--text3:#555;
  --ring-bg:#f0efe9;--stat-bg:#f7f6f2;--msg-bg:#EEEDFE;--msg-c:#3C3489;
  --tab-bg:#fff;--tab-border:rgba(0,0,0,0.08);--hm-empty:#f0efe9;
  --pill-bg:#FAEEDA;--pill-c:#633806;
}
[data-theme="dark"]{
  --bg:#0f0f0e;--card:#1c1c1a;--border:rgba(255,255,255,0.08);--text:#f0efe9;--text2:#666;--text3:#aaa;
  --ring-bg:#2a2a28;--stat-bg:#181816;--msg-bg:#1e1c38;--msg-c:#a09be0;
  --tab-bg:#1c1c1a;--tab-border:rgba(255,255,255,0.06);--hm-empty:#2a2a28;
  --pill-bg:#2e1f05;--pill-c:#e8a84a;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:60px;transition:background 0.3s,color 0.3s}

.tab-bar{display:flex;background:var(--tab-bg);border-bottom:0.5px solid var(--tab-border);position:sticky;top:0;z-index:20;align-items:center}
.tab{flex:1;padding:14px 8px;text-align:center;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:color 0.2s,border-color 0.2s}
.tab.active{color:#7F77DD;border-bottom-color:#7F77DD}
.dark-toggle{padding:10px 14px;cursor:pointer;font-size:17px;background:none;border:none;color:var(--text);flex-shrink:0}

.page{display:none}.page.active{display:block}

.header{background:var(--card);padding:16px 20px 14px;border-bottom:0.5px solid var(--border)}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.date-nav{display:flex;align-items:center;gap:8px}
.date-nav button{background:none;border:0.5px solid var(--border);border-radius:8px;padding:5px 10px;font-size:15px;cursor:pointer;color:var(--text)}
.date-nav button:active{opacity:0.6}
.day-title{font-size:16px;font-weight:600;color:var(--text)}
.day-sub{font-size:12px;color:var(--text2);margin-top:1px}
.streak-pill{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:6px 12px;background:var(--pill-bg);color:var(--pill-c);border-radius:99px}

.ring-row{display:flex;align-items:center;gap:20px;padding:16px 20px;background:var(--card);border-bottom:0.5px solid var(--border)}
.ring-wrap{position:relative;width:72px;height:72px;flex-shrink:0}
.ring-wrap svg{width:72px;height:72px;transform:rotate(-90deg)}
.ring-bg-el{fill:none;stroke:var(--ring-bg);stroke-width:6}
.ring-fg{fill:none;stroke:#7F77DD;stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset 0.5s cubic-bezier(.4,0,.2,1)}
.ring-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-num{font-size:18px;font-weight:700;color:var(--text)}
.ring-den{font-size:10px;color:var(--text2)}
.ring-stats{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.rstat{background:var(--stat-bg);border-radius:10px;padding:8px 10px;position:relative;overflow:hidden}
.rstat-val{font-size:17px;font-weight:600;color:var(--text);transition:transform 0.2s}
.rstat-lbl{font-size:10px;color:var(--text2);margin-top:1px}

/* XP mini bar in stat */
.xp-mini-bar{height:3px;background:var(--ring-bg);border-radius:99px;margin-top:5px;overflow:hidden}
.xp-mini-fill{height:100%;background:#7F77DD;border-radius:99px;transition:width 0.6s cubic-bezier(.4,0,.2,1)}

.msg-box{margin:12px 16px 4px;background:var(--msg-bg);border-radius:12px;padding:10px 14px;font-size:13px;color:var(--msg-c);line-height:1.4}

.phase-section{margin:12px 16px 0}
.phase-label{font-size:11px;font-weight:600;padding:3px 10px;border-radius:99px;display:inline-flex;align-items:center;gap:4px;margin-bottom:8px;letter-spacing:0.02em}
.habit-row{display:flex;align-items:center;gap:10px;background:var(--card);border:0.5px solid var(--border);border-radius:14px;padding:11px 12px;margin-bottom:8px;transition:background 0.2s,border-color 0.2s,transform 0.15s}
.habit-row.done{border-color:#1D9E75;background:#E1F5EE}
[data-theme="dark"] .habit-row.done{background:#0d2b22}
.habit-row.pop{animation:rowPop 0.3s cubic-bezier(.36,.07,.19,.97)}
@keyframes rowPop{0%{transform:scale(1)}40%{transform:scale(1.025)}100%{transform:scale(1)}}
.habit-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.habit-info{flex:1;min-width:0}
.habit-name{font-size:14px;font-weight:500;color:var(--text)}
.habit-sub{font-size:11px;color:var(--text2);margin-top:2px}
.habit-meta{display:flex;align-items:center;gap:6px;margin-top:4px;flex-wrap:wrap}
.time-tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:99px}
.sched-tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:99px;background:#f0efe9;color:#555}
[data-theme="dark"] .sched-tag{background:#2a2a28;color:#aaa}
.week-row{display:flex;gap:4px;margin-top:6px}
.week-dot{width:8px;height:8px;border-radius:50%;background:var(--ring-bg);border:0.5px solid var(--border)}
.week-dot.done{background:#1D9E75;border-color:#1D9E75}
.week-dot.today{border:2px solid #7F77DD}
.habit-xp{font-size:11px;font-weight:600;color:#7F77DD;flex-shrink:0;margin-right:4px}
.check-btn{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px;color:transparent;transition:all 0.2s;position:relative}
.check-btn.done{background:#1D9E75;border-color:#1D9E75;color:#fff}
.check-btn.bounce{animation:btnBounce 0.35s cubic-bezier(.36,.07,.19,.97)}
@keyframes btnBounce{0%{transform:scale(1)}30%{transform:scale(1.35)}70%{transform:scale(0.9)}100%{transform:scale(1)}}

/* XP Toast */
.xp-toast{position:fixed;left:50%;transform:translateX(-50%);background:#7F77DD;color:#fff;font-size:13px;font-weight:600;padding:8px 18px;border-radius:99px;z-index:500;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(127,119,221,0.4);display:flex;align-items:center;gap:8px}
.xp-toast.show{animation:toastIn 0.3s cubic-bezier(.34,1.56,.64,1) forwards}
.xp-toast.hide{animation:toastOut 0.25s ease-in forwards}
@keyframes toastIn{from{opacity:0;top:80px;transform:translateX(-50%) scale(0.85)}to{opacity:1;top:100px;transform:translateX(-50%) scale(1)}}
@keyframes toastOut{from{opacity:1;top:100px;transform:translateX(-50%) scale(1)}to{opacity:0;top:80px;transform:translateX(-50%) scale(0.85)}}

/* Floating +XP number from button */
.xp-float{position:fixed;font-size:15px;font-weight:700;color:#7F77DD;pointer-events:none;z-index:600;animation:floatUp 0.9s ease-out forwards}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(0.8)}}

/* Level up banner */
.levelup-banner{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:700;pointer-events:none}
.levelup-inner{background:#7F77DD;color:#fff;border-radius:20px;padding:24px 32px;text-align:center;box-shadow:0 8px 40px rgba(127,119,221,0.5);animation:bannerPop 0.4s cubic-bezier(.34,1.56,.64,1) forwards}
.levelup-inner h2{font-size:24px;margin-bottom:4px}
.levelup-inner p{font-size:14px;opacity:0.85}
@keyframes bannerPop{from{opacity:0;transform:scale(0.7)}to{opacity:1;transform:scale(1)}}

/* Overview */
.ov-header{padding:20px 20px 8px;background:var(--card);border-bottom:0.5px solid var(--border)}
.ov-title{font-size:20px;font-weight:700;color:var(--text)}
.ov-sub{font-size:13px;color:var(--text2);margin-top:2px}
.big-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:16px}
.bstat{background:var(--card);border-radius:14px;padding:14px 16px;border:0.5px solid var(--border)}
.bstat-val{font-size:28px;font-weight:700}
.bstat-lbl{font-size:12px;color:var(--text2);margin-top:3px}
.bstat.purple .bstat-val{color:#7F77DD}
.bstat.teal .bstat-val{color:#1D9E75}
.bstat.amber .bstat-val{color:#BA7517}
.bstat.coral .bstat-val{color:#D85A30}
.heatmap-wrap,.week-chart-wrap,.level-wrap{margin:0 16px 16px;background:var(--card);border-radius:14px;padding:16px;border:0.5px solid var(--border)}
.heatmap-title,.week-chart-title,.level-title{font-size:13px;font-weight:600;margin-bottom:12px;color:var(--text)}
.heatmap-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:5px}
.hm-cell{aspect-ratio:1;border-radius:5px;background:var(--hm-empty)}
.hm-cell.c1{background:#C0DD97}.hm-cell.c2{background:#97C459}.hm-cell.c3{background:#639922}.hm-cell.c4{background:#3B6D11}
.hm-legend{display:flex;align-items:center;gap:6px;margin-top:10px;font-size:10px;color:var(--text2)}
.hm-legend-cell{width:10px;height:10px;border-radius:3px}
.bar-row{display:flex;align-items:flex-end;gap:6px;height:80px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{width:100%;background:var(--stat-bg);border-radius:5px 5px 0 0;transition:height 0.4s;min-height:3px}
.bar.today-bar{background:#7F77DD}
.bar-lbl{font-size:9px;color:var(--text2)}
.level-sub{font-size:11px;color:var(--text2);margin-bottom:10px}
.level-bar-bg{height:10px;background:var(--ring-bg);border-radius:99px;overflow:hidden}
.level-bar-fg{height:100%;background:#7F77DD;border-radius:99px;transition:width 0.6s cubic-bezier(.4,0,.2,1)}
.level-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text2);margin-top:4px}

/* Confetti */
.confetti-piece{position:fixed;width:8px;height:8px;border-radius:2px;animation:fall 1.4s ease-in forwards;pointer-events:none;z-index:999}
@keyframes fall{0%{opacity:1;transform:translateY(-20px) rotate(0deg)}100%{opacity:0;transform:translateY(105vh) rotate(720deg)}}
</style>
</head>
<body>

<div class="tab-bar">
  <div class="tab active" onclick="showPage('today',this)">● Heute</div>
  <div class="tab" onclick="showPage('overview',this)">▦ Übersicht</div>
  <button class="dark-toggle" onclick="toggleDark()" id="dark-btn" aria-label="Dark Mode">🌙</button>
</div>

<!-- TODAY -->
<div class="page active" id="page-today">
  <div class="header">
    <div class="header-top">
      <div class="date-nav">
        <button onclick="shiftDay(-1)">‹</button>
        <div>
          <div class="day-title" id="day-title">Heute</div>
          <div class="day-sub" id="day-sub"></div>
        </div>
        <button onclick="shiftDay(1)">›</button>
      </div>
      <div class="streak-pill">🔥 <span id="streak-count">0</span> Tage</div>
    </div>
  </div>

  <div class="ring-row">
    <div class="ring-wrap">
      <svg viewBox="0 0 72 72">
        <circle class="ring-bg-el" cx="36" cy="36" r="30"/>
        <circle class="ring-fg" id="ring-fg" cx="36" cy="36" r="30" stroke-dasharray="188.5" stroke-dashoffset="188.5"/>
      </svg>
      <div class="ring-label">
        <div class="ring-num" id="ring-num">0</div>
        <div class="ring-den" id="ring-den">/0</div>
      </div>
    </div>
    <div class="ring-stats">
      <div class="rstat">
        <div class="rstat-val" id="total-xp">0</div>
        <div class="rstat-lbl">Gesamt-XP</div>
        <div class="xp-mini-bar"><div class="xp-mini-fill" id="xp-mini-fill" style="width:0%"></div></div>
      </div>
      <div class="rstat"><div class="rstat-val" id="level-num">1</div><div class="rstat-lbl">Level</div></div>
      <div class="rstat"><div class="rstat-val" id="best-streak">0</div><div class="rstat-lbl">Bester Streak</div></div>
      <div class="rstat"><div class="rstat-val" id="avg-daily">0</div><div class="rstat-lbl">Ø pro Tag</div></div>
    </div>
  </div>

  <div class="msg-box" id="msg-box">Leg los!</div>
  <div id="habits-container"></div>
</div>

<!-- OVERVIEW -->
<div class="page" id="page-overview">
  <div class="ov-header">
    <div class="ov-title">Gesamtübersicht</div>
    <div class="ov-sub" id="ov-sub">Dein Fortschritt auf einen Blick</div>
  </div>
  <div class="big-stats">
    <div class="bstat purple"><div class="bstat-val" id="ov-xp">0</div><div class="bstat-lbl">Gesamt-XP</div></div>
    <div class="bstat teal"><div class="bstat-val" id="ov-streak">0</div><div class="bstat-lbl">Aktueller Streak</div></div>
    <div class="bstat amber"><div class="bstat-val" id="ov-best">0</div><div class="bstat-lbl">Bester Streak</div></div>
    <div class="bstat coral"><div class="bstat-val" id="ov-perfect">0</div><div class="bstat-lbl">Perfekte Tage</div></div>
  </div>
  <div class="heatmap-wrap">
    <div class="heatmap-title">Letzte 70 Tage</div>
    <div class="heatmap-grid" id="heatmap"></div>
    <div class="hm-legend">
      <span>weniger</span>
      <div class="hm-legend-cell" style="background:var(--hm-empty)"></div>
      <div class="hm-legend-cell" style="background:#C0DD97"></div>
      <div class="hm-legend-cell" style="background:#97C459"></div>
      <div class="hm-legend-cell" style="background:#639922"></div>
      <div class="hm-legend-cell" style="background:#3B6D11"></div>
      <span>mehr</span>
    </div>
  </div>
  <div class="week-chart-wrap">
    <div class="week-chart-title">Letzte 7 Tage</div>
    <div class="bar-row" id="bar-row"></div>
  </div>
  <div class="level-wrap">
    <div class="level-title">Level <span id="ov-level">1</span></div>
    <div class="level-sub" id="ov-level-sub"></div>
    <div class="level-bar-bg"><div class="level-bar-fg" id="ov-level-bar" style="width:0%"></div></div>
    <div class="level-labels"><span>Level <span id="ov-lv-cur">1</span></span><span>Level <span id="ov-lv-next">2</span></span></div>
  </div>
</div>

<script>
// dow: 0=Sun,1=Mon,2=Tue,3=Wed,4=Thu,5=Fri,6=Sat
const ALL_PHASES=[
  {id:'morgen',label:'Vor der Arbeit · 4:45',bg:'#FAEEDA',tc:'#633806',darkBg:'#2e1f05',darkTc:'#e8a84a',habits:[
    {id:'teeth-m',name:'Zähneputzen (morgens)',sub:'Direkt nach dem Aufstehen',icon:'🦷',ibg:'#E6F1FB',xp:5,tip:'4:45',days:'all'},
    {id:'water-m',name:'Großes Glas Wasser',sub:'Hydration sofort starten',icon:'💧',ibg:'#E6F1FB',xp:10,tip:'4:45',days:'all'},
    {id:'nophone-m',name:'Kein Handy erste 10 Min.',sub:'Ruhiger Start in den Tag',icon:'🧠',ibg:'#EEEDFE',xp:10,tip:'4:45',days:'all'},
  ]},
  {id:'pendeln',label:'Pendelzeit hin · 5–6 Uhr',bg:'#E6F1FB',tc:'#0C447C',darkBg:'#051929',darkTc:'#7ab5e8',habits:[
    {id:'podcast',name:'Podcast / Hörbuch',sub:'Lernzeit im Bus oder Auto',icon:'🎧',ibg:'#EEEDFE',xp:15,tip:'5:00–6:00',days:'all'},
  ]},
  {id:'arbeit',label:'Arbeit · 6–14 Uhr',bg:'#EEEDFE',tc:'#3C3489',darkBg:'#12103a',darkTc:'#a09be0',habits:[
    {id:'water-w',name:'1 L Wasser während der Arbeit',sub:'Schicht + Bewegung = Bedarf',icon:'💧',ibg:'#E6F1FB',xp:10,tip:'6–14 Uhr',days:'all'},
    {id:'pause',name:'Pause wirklich nutzen',sub:'5–10 Min. aufstehen / raus',icon:'🚶',ibg:'#E1F5EE',xp:10,tip:'Pause',days:'all'},
  ]},
  {id:'nachmittag',label:'Nach der Schicht · ab 15 Uhr',bg:'#E1F5EE',tc:'#085041',darkBg:'#041a12',darkTc:'#4dbd96',habits:[
    {id:'move',name:'Sofort raus nach Heimkommen',sub:'25 Min. — Handy in anderen Raum',icon:'⚡',ibg:'#E1F5EE',xp:20,tip:'15:00',days:'all'},
    {id:'gym',name:'Gym',sub:'Krafttraining Nachmittag',icon:'🏋️',ibg:'#FAEEDA',xp:25,tip:'Nachmittag',days:[2,4,5]},
    {id:'shower-sport',name:'Duschen nach Sport',sub:'Nach Gym oder Fußball',icon:'🚿',ibg:'#E6F1FB',xp:5,tip:'Nach Sport',days:[1,2,3,4,5]},
    {id:'breathe',name:'5 Min. Atemübung',sub:'Box-Breathing — runterkommen',icon:'🫁',ibg:'#FAECE7',xp:10,tip:'15:30',days:'all'},
    {id:'water-pm',name:'0,5 L Wasser nach der Schicht',sub:'Resthydration Nachmittag',icon:'💧',ibg:'#E6F1FB',xp:5,tip:'15–18 Uhr',days:'all'},
    {id:'learn',name:'1 Lernblock (20–30 Min.)',sub:'Laut erklären, kein Handy',icon:'📖',ibg:'#EEEDFE',xp:20,tip:'Nach Spaziergang',days:'all'},
  ]},
  {id:'abend',label:'Abend',bg:'#F3E8FB',tc:'#5C2D91',darkBg:'#1a0a2e',darkTc:'#c29ae8',habits:[
    {id:'football',name:'Fußballtraining',sub:'Abendtraining',icon:'⚽',ibg:'#E1F5EE',xp:25,tip:'Abends',days:[1,3]},
    {id:'journal',name:'3 Dinge aufschreiben',sub:'Was war gut heute?',icon:'✏️',ibg:'#FBEAF0',xp:10,tip:'Abends',days:'all'},
    {id:'teeth-e',name:'Zähneputzen (abends)',sub:'Vor dem Schlafen',icon:'🦷',ibg:'#E6F1FB',xp:5,tip:'Vor 22 Uhr',days:'all'},
    {id:'sleep',name:'Vor 22 Uhr schlafen',sub:'7 h für den 4:45-Wecker',icon:'🌙',ibg:'#EEEDFE',xp:15,tip:'22:00',days:'all'},
  ]},
];

const LEVELS=[100,250,500,900,1500,2500,4000,6000];
const MSGS={
  0:['Los geht\'s!'],1:['Erster Haken — gut!'],2:['Momentum aufgebaut!'],
  3:['Drei! Stark.'],4:['Halbzeit!'],5:['Fünf — on fire.'],
  6:['Sechs! Fast durch.'],7:['Nur noch zwei!'],8:['Vorletzter!'],
  9:['Fast perfekt!'],10:['PERFEKTER TAG! 🎉'],11:['PERFEKT! Alle Habits ✓ 🎉'],
  12:['LEGEND! ✓ 🎉'],13:['UNSTOPPABLE! 🎉'],
};

let offset=0;
let dark=localStorage.getItem('darkMode')==='1';
let toastTimer=null;
let lastXP=0;
let lastLevel=1;

function applyDark(){
  document.documentElement.setAttribute('data-theme',dark?'dark':'');
  document.getElementById('dark-btn').textContent=dark?'☀️':'🌙';
  localStorage.setItem('darkMode',dark?'1':'0');
}
function toggleDark(){dark=!dark;applyDark();render();}
applyDark();

function dk(o){const d=new Date();d.setDate(d.getDate()+o);return d.toISOString().slice(0,10);}
function getDow(o){const d=new Date();d.setDate(d.getDate()+o);return d.getDay();}
function dlabel(o){
  const d=new Date();d.setDate(d.getDate()+o);
  const wd=d.toLocaleDateString('de-DE',{weekday:'long'});
  const dt=d.toLocaleDateString('de-DE',{day:'numeric',month:'long'});
  return[o===0?'Heute':o===-1?'Gestern':wd,dt];
}
function load(){try{return JSON.parse(localStorage.getItem('hbt6')||'{}');}catch{return{};}}
function save(s){try{localStorage.setItem('hbt6',JSON.stringify(s));}catch{}}
let S=load();

function habitActive(h,dow){return h.days==='all'||h.days.includes(dow);}
function getActiveHabits(dow){return ALL_PHASES.flatMap(p=>p.habits.filter(h=>habitActive(h,dow)));}
function isDone(dateKey,id){return(S[dateKey]||[]).includes(id);}

function vibrate(){
  try{
    if(navigator.vibrate){navigator.vibrate([30]);}
  }catch(e){}
}

function showXPToast(gained,newXP,oldLv,newLv,lvPct,btnEl){
  // Floating number from button
  if(btnEl&&gained>0){
    const rect=btnEl.getBoundingClientRect();
    const fl=document.createElement('div');
    fl.className='xp-float';
    fl.textContent='+'+gained+' XP';
    fl.style.left=(rect.left+rect.width/2)+'px';
    fl.style.top=(rect.top)+'px';
    document.body.appendChild(fl);
    setTimeout(()=>fl.remove(),900);
  }

  // Level up banner
  if(newLv>oldLv){
    const banner=document.createElement('div');
    banner.className='levelup-banner';
    banner.innerHTML=`<div class="levelup-inner"><h2>⭐ Level Up!</h2><p>Du bist jetzt Level ${newLv}</p></div>`;
    document.body.appendChild(banner);
    setTimeout(()=>banner.remove(),2200);
  }

  // Toast
  if(toastTimer)clearTimeout(toastTimer);
  let existing=document.querySelector('.xp-toast');
  if(existing){existing.remove();}

  if(gained>0){
    const t=document.createElement('div');
    t.className='xp-toast show';
    t.innerHTML=`<span>+${gained} XP</span><span style="opacity:0.7;font-size:11px">Lv.${newLv} · ${Math.round(lvPct)}%</span>`;
    document.body.appendChild(t);
    toastTimer=setTimeout(()=>{
      t.classList.remove('show');
      t.classList.add('hide');
      setTimeout(()=>t.remove(),300);
    },1800);
  }
}

function toggle(dateKey,id,total,btnId){
  const oldXP=totalXP();
  const oldLv=calcLevel(oldXP).lv;

  if(!S[dateKey])S[dateKey]=[];
  const i=S[dateKey].indexOf(id);
  const adding=i<0;
  if(i>=0)S[dateKey].splice(i,1);
  else S[dateKey].push(id);
  save(S);

  vibrate();

  // Animate button
  const btn=document.getElementById(btnId);
  if(btn){
    btn.classList.remove('bounce');
    void btn.offsetWidth;
    btn.classList.add('bounce');
  }

  // Animate row
  const row=btn&&btn.closest('.habit-row');
  if(row){
    row.classList.remove('pop');
    void row.offsetWidth;
    row.classList.add('pop');
  }

  const newXP=totalXP();
  const newLvData=calcLevel(newXP);
  const gained=adding?(ALL_PHASES.flatMap(p=>p.habits).find(h=>h.id===id)?.xp||0):0;
  const lvPct=Math.min(100,newLvData.cur/newLvData.max*100);

  showXPToast(gained,newXP,oldLv,newLvData.lv,lvPct,btn);

  if(adding&&(S[dateKey]||[]).length===total)confetti();

  render(true);
}

function totalXP(){
  let x=0;
  Object.keys(S).forEach(k=>{
    const dow=new Date(k).getDay();
    const active=getActiveHabits(dow);
    (S[k]||[]).forEach(id=>{const h=active.find(h=>h.id===id);if(h)x+=h.xp;});
  });return x;
}
function streak(){
  let s=0,d=new Date();
  for(let i=0;i<500;i++){
    const k=d.toISOString().slice(0,10);
    if((S[k]||[]).length>0)s++;
    else if(k!==dk(0))break;
    d.setDate(d.getDate()-1);
  }return s;
}
function bestStreak(){
  const keys=Object.keys(S).filter(k=>(S[k]||[]).length>0).sort();
  if(!keys.length)return 0;
  let best=1,cur=1;
  for(let i=1;i<keys.length;i++){
    const diff=(new Date(keys[i])-new Date(keys[i-1]))/86400000;
    cur=diff===1?cur+1:1;if(cur>best)best=cur;
  }return best;
}
function perfectDays(){
  return Object.keys(S).filter(k=>{
    const dow=new Date(k).getDay();
    return(S[k]||[]).length>=getActiveHabits(dow).length;
  }).length;
}
function avgDaily(){
  const days=Object.keys(S).filter(k=>(S[k]||[]).length>0);
  if(!days.length)return 0;
  return Math.round(days.reduce((a,k)=>a+(S[k]||[]).length,0)/days.length*10)/10;
}
function calcLevel(xp){
  for(let i=0;i<LEVELS.length;i++){
    if(xp<LEVELS[i]){const prev=i>0?LEVELS[i-1]:0;return{lv:i+1,cur:xp-prev,max:LEVELS[i]-prev};}
  }
  return{lv:LEVELS.length+1,cur:xp-LEVELS[LEVELS.length-1],max:8000};
}
function last7(id){
  return Array.from({length:7},(_,i)=>{
    const d=new Date();d.setDate(d.getDate()-6+i);
    const k=d.toISOString().slice(0,10);
    return{today:i===6,done:(S[k]||[]).includes(id)};
  });
}
function schedLabel(days){
  const map={1:'Mo',2:'Di',3:'Mi',4:'Do',5:'Fr',6:'Sa',0:'So'};
  return days.map(d=>map[d]).join(' · ');
}

function confetti(){
  const colors=['#7F77DD','#1D9E75','#EF9F27','#D85A30','#D4537E','#378ADD'];
  for(let i=0;i<70;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.cssText=`left:${Math.random()*100}vw;top:-10px;background:${colors[~~(Math.random()*colors.length)]};animation-delay:${Math.random()*0.9}s`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),2200);
  }
}

function render(skipOvUpdate){
  const key=dk(offset);
  const dow=getDow(offset);
  const[title,sub]=dlabel(offset);
  document.getElementById('day-title').textContent=title;
  document.getElementById('day-sub').textContent=sub;

  const activeHabits=getActiveHabits(dow);
  const total=activeHabits.length;
  const dc=(S[key]||[]).filter(id=>activeHabits.find(h=>h.id===id)).length;
  const xp=totalXP();
  const lv=calcLevel(xp);
  const str=streak();
  const best=bestStreak();
  const lvPct=Math.min(100,Math.round(lv.cur/lv.max*100));

  const circ=2*Math.PI*30;
  document.getElementById('ring-fg').style.strokeDashoffset=total>0?circ-(circ*dc/total):circ;
  document.getElementById('ring-num').textContent=dc;
  document.getElementById('ring-den').textContent='/'+total;
  document.getElementById('total-xp').textContent=xp;
  document.getElementById('level-num').textContent=lv.lv;
  document.getElementById('streak-count').textContent=str;
  document.getElementById('best-streak').textContent=best;
  document.getElementById('avg-daily').textContent=avgDaily();
  document.getElementById('xp-mini-fill').style.width=lvPct+'%';

  const m=MSGS[Math.min(dc,total,Object.keys(MSGS).length-1)];
  document.getElementById('msg-box').textContent=(m||MSGS[0])[0];

  const isDarkMode=dark;
  const c=document.getElementById('habits-container');
  c.innerHTML='';

  ALL_PHASES.forEach(ph=>{
    const phHabits=ph.habits.filter(h=>habitActive(h,dow));
    if(!phHabits.length)return;
    const sec=document.createElement('div');
    sec.className='phase-section';
    const lbl=document.createElement('div');
    lbl.className='phase-label';
    lbl.style.background=isDarkMode?(ph.darkBg||ph.bg):ph.bg;
    lbl.style.color=isDarkMode?(ph.darkTc||ph.tc):ph.tc;
    lbl.textContent=ph.label;
    sec.appendChild(lbl);

    phHabits.forEach(h=>{
      const done=isDone(key,h.id);
      const l7=last7(h.id);
      const isScheduled=h.days!=='all';
      const btnId='btn-'+h.id;
      const row=document.createElement('div');
      row.className='habit-row'+(done?' done':'');
      const phaseBg=isDarkMode?(ph.darkBg||ph.bg):ph.bg;
      const phaseTc=isDarkMode?(ph.darkTc||ph.tc):ph.tc;
      row.innerHTML=`
        <div class="habit-icon" style="background:${h.ibg}">${h.icon}</div>
        <div class="habit-info">
          <div class="habit-name">${h.name}</div>
          <div class="habit-sub">${h.sub}</div>
          <div class="habit-meta">
            <span class="time-tag" style="background:${phaseBg};color:${phaseTc}">${h.tip}</span>
            ${isScheduled?`<span class="sched-tag">${schedLabel(h.days)}</span>`:''}
          </div>
          <div class="week-row">
            ${l7.map(x=>`<div class="week-dot${x.done?' done':''}${x.today?' today':''}"></div>`).join('')}
          </div>
        </div>
        <div class="habit-xp">+${h.xp}</div>
        <button id="${btnId}" class="check-btn${done?' done':''}" onclick="toggle('${key}','${h.id}',${total},'${btnId}')" aria-label="${h.name}">✓</button>`;
      sec.appendChild(row);
    });
    c.appendChild(sec);
  });

  if(!skipOvUpdate)renderOverview(xp,lv,str,best);
}

function renderOverview(xp,lv,str,best){
  document.getElementById('ov-xp').textContent=xp;
  document.getElementById('ov-streak').textContent=str;
  document.getElementById('ov-best').textContent=best;
  document.getElementById('ov-perfect').textContent=perfectDays();
  document.getElementById('ov-level').textContent=lv.lv;
  document.getElementById('ov-level-sub').textContent=lv.cur+' / '+lv.max+' XP bis Level '+(lv.lv+1);
  document.getElementById('ov-level-bar').style.width=Math.min(100,Math.round(lv.cur/lv.max*100))+'%';
  document.getElementById('ov-lv-cur').textContent=lv.lv;
  document.getElementById('ov-lv-next').textContent=lv.lv+1;

  const hm=document.getElementById('heatmap');
  hm.innerHTML='';
  for(let i=69;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    const k=d.toISOString().slice(0,10);
    const n=(S[k]||[]).length;
    const cell=document.createElement('div');
    cell.className='hm-cell'+(n===0?'':n<=2?' c1':n<=5?' c2':n<=8?' c3':' c4');
    cell.title=k+': '+n;
    hm.appendChild(cell);
  }

  const br=document.getElementById('bar-row');
  br.innerHTML='';
  const days7=Array.from({length:7},(_,i)=>{
    const d=new Date();d.setDate(d.getDate()-6+i);
    const k=d.toISOString().slice(0,10);
    const lbl=d.toLocaleDateString('de-DE',{weekday:'short'}).slice(0,2);
    return{k,lbl,n:(S[k]||[]).length,today:i===6};
  });
  const maxN=Math.max(...days7.map(d=>d.n),1);
  days7.forEach(d=>{
    const col=document.createElement('div');col.className='bar-col';
    const pct=Math.round(d.n/maxN*100);
    col.innerHTML=`<div class="bar${d.today?' today-bar':''}" style="height:${Math.max(pct,2)}%"></div><div class="bar-lbl">${d.lbl}</div>`;
    br.appendChild(col);
  });

  const activeDays=Object.keys(S).filter(k=>(S[k]||[]).length>0).length;
  document.getElementById('ov-sub').textContent=activeDays+' aktive Tage insgesamt';
}

function showPage(id,tab){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  tab.classList.add('active');
  if(id==='overview'){const xp=totalXP();renderOverview(xp,calcLevel(xp),streak(),bestStreak());}
  else render();
}

function shiftDay(d){offset=Math.min(0,offset+d);render();}
render();
</script>
